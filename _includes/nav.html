<a href="#main-content" class="skip-link">Skip to content</a>

<div class="top-bar">
  <div class="wrap">
    <div class="top-bar__hours">Open 24 hours, every day <strong>&middot;</strong> {{ site.address }}</div>
    <a class="top-bar__call" href="tel:{{ site.phone_raw }}">Call or text {{ site.phone }}</a>
  </div>
</div>

<nav class="site-nav" id="site-nav">
  <div class="wrap">
    <a class="site-nav__brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/Images/RPWLogo.webp' | relative_url }}" alt="Ronin Pressure Washing logo">
      Ronin Pressure Washing
    </a>

    <ul class="site-nav__links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/about/' | relative_url }}">About</a></li>
      <li><a href="{{ '/services/' | relative_url }}">Services</a></li>
      <li><a href="{{ '/services-areas/' | relative_url }}">Service Areas</a></li>
      <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
      <li><a href="{{ '/reviews/' | relative_url }}">Reviews</a></li>
      <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
    </ul>

    <a class="site-nav__cta" href="{{ '/contact/' | relative_url }}">Get a free estimate</a>

    <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">&#9776;</button>
  </div>
</nav>

<div class="sticky-call">
  <a href="tel:{{ site.phone_raw }}">&#128222; Call now: {{ site.phone }}</a>
</div>

<script>
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var nav = document.getElementById('site-nav');
    if (toggle && nav) {
      toggle.addEventListener('click', function () {
        var isOpen = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }
  })();
</script>
