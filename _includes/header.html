<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="brand">
      <img src="{{ '/Images/RPWLogo.webp' | relative_url }}" alt="Ronin Pressure Washing logo">
      <span class="brand-text">Ronin<span>Pressure Washing</span></span>
    </a>

    <nav class="main-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
      <a href="{{ '/services/' | relative_url }}" {% if page.url contains '/services/' %}class="active"{% endif %}>Services</a>
      <a href="{{ '/service-areas/' | relative_url }}" {% if page.url contains '/service-areas/' %}class="active"{% endif %}>Service Areas</a>
      <a href="{{ '/gallery/' | relative_url }}" {% if page.url == '/gallery/' %}class="active"{% endif %}>Gallery</a>
      <a href="{{ '/reviews/' | relative_url }}" {% if page.url == '/reviews/' %}class="active"{% endif %}>Reviews</a>
      <a href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}class="active"{% endif %}>Contact</a>
    </nav>

    <a href="tel:{{ site.phone_raw }}" class="header-phone">{{ site.phone }}</a>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </div>
</header>
